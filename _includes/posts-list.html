<div class="posts-list">
  {% if include.block.show_posts %}
    <h2>Latest Posts</h2>
    <ul>
      {% for post in site.posts %}
        <li>
          <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
          <time datetime="{{ post.date | date_to_xmlschema }}">
            {{ post.date | date_to_string }}
          </time>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No posts to display.</p>
  {% endif %}
</div>
